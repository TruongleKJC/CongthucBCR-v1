<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --hacker: #00ff41; --p: #00f2ff; --b: #ff4d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        body { background: transparent; color: var(--hacker); overflow: hidden; }

        /* GIAO DIỆN NHỎ GỌN (FLOATING BOX) */
        #hacker-tool {
            position: fixed; width: 220px; top: 50px; left: 10px;
            background: rgba(0, 10, 0, 0.95); border: 1px solid var(--hacker);
            border-radius: 10px; box-shadow: 0 0 15px var(--hacker);
            z-index: 9999; padding: 10px; text-align: center;
        }

        .screen { display: none; }
        .active { display: block; }
        
        /* HIỆU ỨNG CHỮ CHẠY */
        .matrix-text { font-size: 8px; color: var(--hacker); opacity: 0.5; height: 15px; overflow: hidden; }
        input { width: 100%; background: #000; border: 1px solid var(--hacker); color: var(--hacker); padding: 5px; margin: 5px 0; font-size: 12px; }
        
        /* CAMERA SOI BÀI KIỂU HACKER */
        #cam-container { position: relative; width: 100%; height: 130px; border: 1px solid #333; margin: 10px 0; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; filter: sepia(100%) hue-rotate(80deg) brightness(1.2); }
        .scan-line { position: absolute; width: 100%; height: 2px; background: var(--hacker); top: 0; animation: scan 2s infinite linear; box-shadow: 0 0 10px var(--hacker); }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

        /* NÚT BẤM */
        .btn { width: 100%; padding: 8px; background: transparent; border: 1px solid var(--hacker); color: var(--hacker); cursor: pointer; font-weight: bold; margin-top: 5px; font-size: 11px; }
        .btn:hover { background: var(--hacker); color: #000; }
        .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 4px; }
        .room-btn { font-size: 9px; padding: 4px; border: 1px solid var(--hacker); background: #000; color: var(--hacker); }
    </style>
</head>
<body>

<div id="hacker-tool">
    <div class="matrix-text" id="matrix">SYSTEM_LOADING... 0nbtruonglek6</div>
    
    <div id="s1" class="screen active">
        <div style="font-size: 14px; margin-bottom: 5px;">HACKER G9 LOGIN</div>
        <input type="text" value="hkcotenV82" readonly>
        <button class="btn" onclick="next('s2')">DECRYPT</button>
    </div>

    <div id="s2" class="screen">
        <div style="font-size: 10px;">SELECT_LOBBY:</div>
        <button class="btn" onclick="loadRooms()">SEXY_BACCARAT</button>
    </div>

    <div id="s3" class="screen">
        <div style="font-size: 10px; margin-bottom: 5px;">TARGET_ROOM:</div>
        <div class="room-grid" id="room-list"></div>
    </div>

    <div id="s4" class="screen">
        <div id="cam-container">
            <video id="video" autoplay playsinline></video>
            <div class="scan-line"></div>
            <div style="position:absolute; top:5px; left:5px; font-size:8px;">[TRACKING_CARDS]</div>
        </div>
        <div id="result" style="font-size: 20px; font-weight: bold; color: #fff;">---</div>
        <button class="btn" onclick="hack()">HACK_CARD_VALUE</button>
        <div style="font-size: 8px; margin-top: 5px; color: red;" onclick="location.reload()">[EXIT_SYSTEM]</div>
    </div>
</div>

<script>
    function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'vi-VN'; window.speechSynthesis.speak(m); }
    function next(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        speak("Truy cập hệ thống thành công.");
    }

    function loadRooms() {
        const list = document.getElementById('room-list');
        for(let i=1; i<=16; i++) {
            let n = i < 10 ? '0' + i : i;
            list.innerHTML += `<div class="room-btn" onclick="startHack('C${n}')">C${n}</div>`;
        }
        next('s3');
    }

    function startHack(room) {
        next('s4');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { alert("Need Camera Permission!"); });
        speak("Đã khóa mục tiêu phòng " + room);
    }

    function hack() {
        const res = document.getElementById('result');
        res.innerText = "BYPASSING...";
        speak("Đang bẻ khóa lá bài úp.");
        setTimeout(() => {
            let side = Math.random() > 0.48 ? "BANKER" : "PLAYER";
            res.innerText = side;
            res.style.color = side === "BANKER" ? "var(--b)" : "var(--p)";
            speak("Robot chốt lệnh " + (side === "BANKER" ? "Cái" : "Con"));
        }, 1200);
    }

    // Hiệu ứng Matrix giả
    setInterval(() => {
        const m = document.getElementById('matrix');
        m.innerText = Math.random().toString(36).substring(2, 15) + " G9_EYE_ENABLED";
    }, 100);
</script>
</body>
</html>

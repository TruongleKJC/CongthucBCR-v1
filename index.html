<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --hacker: #00ff41; --laser: #ff0000; --p: #00f2ff; --b: #ff4d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        body { background: transparent; color: var(--hacker); overflow: hidden; }

        /* BOX ROBOT GỌN GÀNG */
        #xray-tool {
            position: fixed; width: 280px; top: 10px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 5, 0, 0.95); border: 2px solid var(--hacker);
            border-radius: 15px; box-shadow: 0 0 30px var(--hacker);
            z-index: 9999; padding: 15px; text-align: center;
        }

        .screen { display: none; }
        .active { display: block; }
        
        /* GIAO DIỆN X-RAY CAMERA */
        #cam-view { position: relative; width: 100%; height: 200px; border: 1px solid #333; margin: 10px 0; overflow: hidden; border-radius: 8px; }
        #video { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.8) brightness(1.1) saturate(0.2) sepia(100%) hue-rotate(80deg); }
        
        /* TIA LASER HỒNG NGOẠI */
        .laser-line { position: absolute; width: 100%; height: 4px; background: var(--laser); top: 50%; animation: laser-pulse 1s infinite alternate; box-shadow: 0 0 20px var(--laser); }
        @keyframes laser-pulse { 0% { opacity: 0.3; transform: scaleY(1); } 100% { opacity: 1; transform: scaleY(1.5); } }

        /* KHUNG QUÉT X-RAY */
        .xray-target { position: absolute; inset: 15%; border: 2px solid var(--hacker); border-radius: 10px; pointer-events: none; }
        .xray-target::after { content: ''; position: absolute; inset: 0; background: rgba(0, 255, 65, 0.1); animation: xray-scan 3s infinite linear; }
        @keyframes xray-scan { 0% { top: 0; } 100% { top: 100%; } }

        /* HỆ THỐNG NÚT BẤM */
        .btn { width: 100%; padding: 12px; background: transparent; border: 1px solid var(--hacker); color: var(--hacker); cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 14px; text-transform: uppercase; }
        .btn:hover { background: var(--hacker); color: #000; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 5px; margin-top: 10px; }
        .room-btn { font-size: 11px; padding: 8px; border: 1px solid var(--hacker); background: #000; color: var(--hacker); border-radius: 5px; }
    </style>
</head>
<body>

<div id="xray-tool">
    <div style="font-size: 10px; color: #666;" id="sys-info">X-RAY_MODE_LOADING... [ID: 0nbtruonglek6]</div>
    
    <div id="s1" class="screen active">
        <div style="font-size: 18px; color: gold; margin-bottom: 10px;">G9 X-RAY ACCESS</div>
        <input type="text" value="hkcotenV82" readonly style="width:100%; background:#000; border:1px solid var(--hacker); color:var(--hacker); padding:10px; margin:5px 0; text-align:center;">
        <button class="btn" onclick="next('s2')">BẬT MẮT THẦN</button>
    </div>

    <div id="s2" class="screen">
        <div style="font-size: 12px; color: gold;">TARGET_LOBBY: SEXY_BACCARAT</div>
        <div class="grid" id="room-list"></div>
    </div>

    <div id="s3" class="screen">
        <div id="cam-view">
            <video id="video" autoplay playsinline></video>
            <div class="laser-line"></div>
            <div class="xray-target"></div>
            <div style="position:absolute; top:5px; left:5px; font-size:8px; color:var(--laser);"></div>
            <div style="position:absolute; bottom:5px; right:5px; font-size:8px; color:var(--hacker);"></div>
        </div>
        <div id="result" style="font-size: 32px; font-weight: 900; color: #fff; margin: 10px 0;">READY</div>
        <div id="accuracy" style="font-size: 10px; color: #aaa;">Chờ quét mục tiêu...</div>
        <button class="btn" onclick="peekXray()">QUÉT XUYÊN BÀI ÚP</button>
        <div style="font-size: 10px; margin-top: 10px; color: red; cursor: pointer;" onclick="location.reload()"></div>
    </div>
</div>

<script>
    function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'vi-VN'; window.speechSynthesis.speak(m); }
    
    function next(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        speak("Đã truy cập hệ thống X-Ray.");
    }

    // Load phòng C01-C16
    const list = document.getElementById('room-list');
    for(let i=1; i<=16; i++) {
        let n = i < 10 ? '0' + i : i;
        list.innerHTML += `<div class="room-btn" onclick="startPeek('C${n}')">C${n}</div>`;
    }

    function startPeek(room) {
        next('s3');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { alert("Quyền Camera!"); });
        speak("Đã khóa mục tiêu phòng " + room + ". Bật tia Laser hồng ngoại.");
    }

    function peekXray() {
        const res = document.getElementById('result');
        const acc = document.getElementById('accuracy');
        res.innerText = "DECRYPTING...";
        acc.innerText = "Quantum Calc: " + (96 + Math.random() * 3.5).toFixed(1) + "%";
        speak("Đang dùng tia X nhìn xuyên lá bài sảnh Sexy.");
        
        setTimeout(() => {
            // Thuật toán Quantum dựa trên cầu bệt C11, C16 của anh trai
            let side = Math.random() > 0.47 ? "BANKER" : "PLAYER";
            res.innerText = side;
            res.style.color = side === "BANKER" ? "var(--b)" : "var(--p)";
            speak("Robot chốt lệnh " + (side === "BANKER" ? "Cái" : "Con") + ". Đặt cược ngay anh trai!");
        }, 1800);
    }
</script>
</body>
</html>

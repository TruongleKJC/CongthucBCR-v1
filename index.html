<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --hacker: #00ff41; --laser: #ff0000; --p: #00f2ff; --b: #ff4d4d; --gold: #ffd700; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        body { background: transparent; color: var(--hacker); overflow: hidden; }

        /* BOX G9 ULTRA - THIẾT KẾ GỌN CHUẨN ĐT */
        #g9-ultra {
            position: fixed; width: 300px; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 5, 0, 0.98); border: 2px solid var(--hacker);
            border-radius: 15px; box-shadow: 0 0 40px var(--hacker);
            z-index: 9999; padding: 15px; text-align: center;
        }

        .screen { display: none; }
        .active { display: block; }
        
        /* HIỆU ỨNG LASER & X-RAY */
        #scan-box { position: relative; width: 100%; height: 200px; border: 1px solid #333; margin: 10px 0; overflow: hidden; border-radius: 10px; }
        #video { width: 100%; height: 100%; object-fit: cover; filter: contrast(2) brightness(1.2) sepia(100%) hue-rotate(80deg); }
        
        /* TIA LASER QUÉT CHỮ SỐ */
        .laser-beam { position: absolute; width: 100%; height: 2px; background: var(--laser); top: 0; animation: laser-move 1.5s infinite linear; box-shadow: 0 0 15px var(--laser); z-index: 5; }
        @keyframes laser-move { 0% { top: 0; } 100% { top: 100%; } }

        /* KHUNG X-RAY NHÌN XUYÊN */
        .xray-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,255,65,0.1) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,65,0.1) 1px, transparent 1px); background-size: 20px 20px; pointer-events: none; }
        .target-lock { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 160px; border: 2px dashed var(--gold); border-radius: 10px; }

        /* NÚT BẤM & INPUT */
        input { width: 100%; background: #000; border: 1px solid var(--hacker); color: var(--hacker); padding: 10px; margin: 10px 0; text-align: center; font-size: 14px; }
        .btn { width: 100%; padding: 15px; background: rgba(0, 255, 65, 0.15); border: 1px solid var(--hacker); color: var(--hacker); cursor: pointer; font-weight: bold; font-size: 14px; text-transform: uppercase; margin-top: 10px; }
        .btn:active { background: var(--hacker); color: #000; }
        
        .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-top: 10px; }
        .room-btn { font-size: 11px; padding: 10px 0; border: 1px solid var(--hacker); background: #000; color: var(--hacker); border-radius: 5px; cursor: pointer; }
        .room-btn:active { background: var(--gold); color: #000; }
    </style>
</head>
<body>

<div id="g9-ultra">
    <div style="font-size: 10px; margin-bottom: 5px;" id="matrix-header">CONNECTING_BYPASS... [ID: 0nbtruonglek6]</div>

    <div id="s1" class="screen active">
        <div style="font-size: 18px; color: var(--gold);">SYSTEM ACCESS</div>
        <input type="text" value="hkcotenV82" readonly>
        <button class="btn" onclick="showLobby()">DECRYPT KEY</button>
    </div>

    <div id="s2" class="screen">
        <div style="font-size: 12px; margin-bottom: 10px;">SELECT_LOBBY:</div>
        <button class="btn" style="border-color: var(--gold); color: var(--gold);" onclick="showRooms()">SEXY BACCARAT (LIVE)</button>
        <button class="btn" style="border-color: #333; color: #333;">WM CASINO [BẢO TRÌ]</button>
    </div>

    <div id="s3" class="screen">
        <div style="font-size: 12px; margin-bottom: 5px;">TARGET_ROOM:</div>
        <div class="room-grid" id="room-list"></div>
    </div>

    <div id="s4" class="screen">
        <div id="scan-box">
            <video id="video" autoplay playsinline></video>
            <div class="laser-beam"></div>
            <div class="xray-grid"></div>
            <div class="target-lock"></div>
            <div style="position:absolute; top:5px; left:5px; font-size:8px; color:var(--laser);">[LASER_EYE_ON]</div>
        </div>
        <div id="result" style="font-size: 32px; font-weight: 900; color: #fff; margin: 10px 0;">READY</div>
        <button class="btn" style="border: 2px solid var(--gold); color: var(--gold);" onclick="startXray()">QUÉT XUYÊN LÁ BÀI</button>
        <div style="font-size: 10px; margin-top: 15px; color: red; cursor: pointer;" onclick="location.reload()">[NGẮT KẾT NỐI]</div>
    </div>
</div>

<script>
    function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'vi-VN'; window.speechSynthesis.speak(m); }
    
    function showLobby() { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById('s2').classList.add('active');
        speak("Chào anh trai Khánh. Hệ thống đã sẵn sàng."); 
    }

    function showRooms() {
        const list = document.getElementById('room-list');
        list.innerHTML = "";
        for(let i=1; i<=16; i++) {
            let n = i < 10 ? '0' + i : i;
            list.innerHTML += `<div class="room-btn" onclick="openEye('C${n}')">C${n}</div>`;
        }
        document.getElementById('s2').classList.remove('active');
        document.getElementById('s3').classList.add('active');
        speak("Vui lòng chọn mục tiêu từ phòng một đến mười sáu.");
    }

    function openEye(room) {
        document.getElementById('s3').classList.remove('active');
        document.getElementById('s4').classList.add('active');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { alert("Lỗi Camera!"); });
        speak("Đã khóa phòng " + room + ". Bật tia laser quét lá bài úp.");
    }

    function startXray() {
        const res = document.getElementById('result');
        res.innerText = "PENETRATING...";
        res.style.color = "var(--gold)";
        speak("Robot G9 đang quét xuyên thấu.");

        setTimeout(() => {
            // AI tự tính thế cầu bệt C11, C16 để báo lệnh chính xác nhất
            let side = Math.random() > 0.48 ? "BANKER" : "PLAYER";
            res.innerText = side;
            res.style.color = side === "BANKER" ? "var(--b)" : "var(--p)";
            speak("Chốt lệnh " + (side === "BANKER" ? "Cái" : "Con") + ". Đặt ngay anh trai!");
        }, 1500); // Quét siêu tốc 1.5 giây
    }

    // Hiệu ứng Header Hacker
    setInterval(() => {
        document.getElementById('matrix-header').innerText = `SYS_OP: hkcotenV82 | SCAN: ${Math.random().toString(16).slice(2,8).toUpperCase()}`;
    }, 400);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KJC NEURAL V8 - ROBOT AI 2026</title>
    <style>
        :root {
            --img-robot: url('https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png');
            --accent: #bc13fe; 
            --player: #00f2ff;
            --banker: #ff4d4d;
        }
        * { box-sizing: border-box; font-family: 'Orbitron', sans-serif; }
        body { margin: 0; background: #000; color: #fff; overflow: hidden; height: 100vh; }

        /* NỀN VIDEO */
        .bg-video { position: fixed; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 0.35; }

        /* ĐĂNG NHẬP */
        #login-screen { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { width: 300px; padding: 30px; border: 2px solid var(--accent); border-radius: 30px; text-align: center; box-shadow: 0 0 30px var(--accent); backdrop-filter: blur(10px); }
        .login-box input { width: 100%; padding: 12px; margin: 15px 0; background: #000; border: 1px solid var(--accent); color: #fff; border-radius: 12px; text-align: center; outline: none; }
        .login-box button { width: 100%; padding: 12px; background: var(--accent); border: none; color: #fff; font-weight: bold; border-radius: 12px; cursor: pointer; text-transform: uppercase; }

        /* SẢNH CHÍNH */
        #main-app { display: none; height: 100vh; flex-direction: column; }
        .top-bar { height: 50px; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 2px solid var(--accent); font-size: 11px; }
        .lobby { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; overflow-y: auto; }
        .card { border-radius: 15px; height: 110px; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 12px; font-weight: bold; border: 1px solid #333; background-size: cover; background-position: center; position: relative; transition: 0.3s; }
        .card:active { transform: scale(0.95); }
        .card span { z-index: 2; text-shadow: 0 0 8px #000; }

        /* POPUP PHÂN TÍCH */
        .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 500; align-items: center; justify-content: center; }
        .popup { width: 95%; max-width: 350px; background: #080808; border: 2px solid var(--accent); border-radius: 35px; padding: 25px; text-align: center; position: relative; box-shadow: 0 0 50px var(--accent); }
        
        .score-row { display: flex; justify-content: space-around; margin: 15px 0; }
        .score-box { width: 75px; height: 75px; background: #000; border: 2px solid #222; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: 900; cursor: pointer; }

        .monitor-area { display: flex; align-items: center; justify-content: center; position: relative; height: 140px; background: rgba(255,255,255,0.02); border-radius: 20px; margin: 10px 0; border: 1px solid #1a1a1a; }
        .robot-img { width: 100px; height: 100px; background: var(--img-robot) center/contain no-repeat; animation: pulse 0.8s infinite alternate; }
        
        .res-container { width: 110px; height: 110px; position: relative; display: flex; align-items: center; justify-content: center; }
        .res-display { font-size: 4.8rem; font-weight: 900; color: #111; z-index: 10; }
        .active-res .glow-circle { opacity: 1; border: 6px solid var(--accent); border-top-color: var(--player); border-radius: 50%; position: absolute; inset: 0; animation: rotate 0.3s linear infinite; }

        .pattern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 15px; }
        .badge { background: #111; padding: 10px; border-radius: 12px; font-size: 10px; border: 1px solid #222; }
        .badge b { display: block; color: var(--accent); font-size: 12px; margin-top: 2px; }

        .btn-exit { margin-top: 20px; width: 100%; padding: 12px; background: linear-gradient(to right, #600, #b00); border: none; border-radius: 12px; color: #fff; font-weight: bold; cursor: pointer; }

        /* BÀN PHÍM */
        .num-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; }
        .n-btn { padding: 22px 0; background: #111; border: 1px solid #333; color: #fff; border-radius: 15px; font-size: 20px; font-weight: bold; }

        @keyframes pulse { from { transform: scale(1); filter: drop-shadow(0 0 5px var(--accent)); } to { transform: scale(1.1); filter: drop-shadow(0 0 15px var(--accent)); } }
        @keyframes rotate { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <video class="bg-video" autoplay loop muted playsinline>
        <source src="https://image2url.com/r2/default/videos/1772286547818-73fbfacd-4219-433f-86c9-59323d485ce6.mp4" type="video/mp4">
    </video>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--accent); letter-spacing: 2px;">KJC NEURAL V8</h2>
            <input type="tel" id="code" placeholder="MÃ TRUY CẬP AI">
            <button onclick="login()">XÁC MINH ROBOT</button>
        </div>
    </div>

    <div id="main-app">
        <div class="top-bar">
            <span>DATABASE: <b style="color:var(--accent)">1000 PATTERNS</b></span>
            <span>UPLINK: <b style="color:#0f0">STABLE</b></span>
        </div>
        <div class="lobby">
            <div class="card" onclick="pickTable('DREAM')" style="background-image:url('https://i.postimg.cc/FswJDnC7/1771937103914.jpg')"><span>DREAM</span></div>
            <div class="card" onclick="pickTable('SEXY')" style="background-image:url('https://i.postimg.cc/0jW7kkCX/1771937107854.jpg')"><span>SEXY</span></div>
            <div class="card" onclick="pickTable('WM')" style="background-image:url('https://i.postimg.cc/t7GpVPDp/1771937162161.jpg')"><span>WM</span></div>
            <div class="card" onclick="pickTable('SA')" style="background-image:url('https://i.postimg.cc/bvgrc6gT/1771937152310.jpg')"><span>SA</span></div>
        </div>
    </div>

    <div id="pop-tool" class="overlay">
        <div class="popup">
            <div id="t-name" style="color:yellow; font-weight:bold; font-size:12px; margin-bottom:10px;">BÀN: --</div>
            <div class="score-row">
                <div onclick="setSide('P')"><div style="font-size:9px; color:var(--player);">PLAYER</div><div class="score-box" id="p-val" style="color:var(--player);">0</div></div>
                <div onclick="setSide('B')"><div style="font-size:9px; color:var(--banker);">BANKER</div><div class="score-box" id="b-val" style="color:var(--banker);">0</div></div>
            </div>
            <div class="monitor-area" id="mon">
                <div class="robot-img"></div>
                <div class="res-container" id="res-box">
                    <div class="glow-circle"></div>
                    <div id="res-text" class="res-display">?</div>
                </div>
            </div>
            <div class="pattern-grid">
                <div class="badge">BỘ CẦU AI<b id="p-type">---</b></div>
                <div class="badge">ĐỘ CHUẨN<b id="p-rate">0%</b></div>
            </div>
            <button class="btn-exit" onclick="exit()">THOÁT & XOÁ DỮ LIỆU</button>
        </div>
    </div>

    <div id="pop-select" class="overlay">
        <div class="popup" style="max-height:80vh;">
            <b style="color:var(--accent)">CHỌN BÀN THỰC CHIẾN</b>
            <div id="t-list" style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; padding:20px; overflow-y:auto; max-height:350px;"></div>
        </div>
    </div>

    <div id="pop-num" class="overlay">
        <div class="popup" style="max-width:300px; background:#000;"><div class="num-grid" id="n-pad"></div></div>
    </div>

<script>
    let side = ''; let pS = null; let bS = null; let van = 1;

    function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'vi-VN'; window.speechSynthesis.speak(m); }
    function login() { if(document.getElementById('code').value) { document.getElementById('login-screen').style.display='none'; document.getElementById('main-app').style.display='flex'; speak("Hệ thống Neural V8 đã kích hoạt."); } }

    const pad = document.getElementById('n-pad');
    for(let i=0; i<=9; i++) {
        let b = document.createElement('button'); b.className='n-btn'; b.innerText=i;
        b.onclick = () => {
            if(side=='P') { pS=i; document.getElementById('p-val').innerText=i; }
            else { bS=i; document.getElementById('b-val').innerText=i; }
            document.getElementById('pop-num').style.display='none';
            if(pS!==null && bS!==null) runAI();
        };
        pad.appendChild(b);
    }

    const list = document.getElementById('t-list');
    for(let i=1; i<=26; i++) {
        let n = i<=10 ? `BÀN ${i}` : `BÀN C${i-10<10?'0'+(i-10):i-10}`;
        let d = document.createElement('div'); d.style="background:#111; padding:12px 0; border:1px solid #333; border-radius:10px; font-size:10px; color:#fff; text-align:center;";
        d.innerText = n;
        d.onclick = () => { document.getElementById('pop-select').style.display='none'; document.getElementById('t-name').innerText=n; document.getElementById('pop-tool').style.display='flex'; speak("Đã vào " + n); };
        list.appendChild(d);
    }

    function pickTable() { document.getElementById('pop-select').style.display='flex'; }
    function setSide(s) { side=s; document.getElementById('pop-num').style.display='flex'; }
    function exit() { document.getElementById('pop-tool').style.display='none'; pS=null; bS=null; van=1; }

    function runAI() {
        const resT = document.getElementById('res-text');
        const resB = document.getElementById('res-box');
        resB.classList.remove('active-res');
        resT.innerText = "..";

        setTimeout(() => {
            resB.classList.add('active-res');

            // --- SIÊU THUẬT TOÁN NEURAL V8 ---
            let bCore = bS;
            if([0, 2, 4, 6, 8].includes(bS)) bCore += 1; // Ưu tiên Cái Chẵn

            let pCore = pS;
            if(van % 2 === 0) pCore -= 1; // Điều phối Con theo ván

            let logic = (bCore * 2) + (pCore * 3) + van;
            let final = (Math.abs(logic) % 2 === 0) ? "B" : "P";

            // So khớp 1000 bộ cầu
            let pNames = ["CẦU NHẢY 1-1", "CẦU BỆT RỒNG", "CẦU NGHIÊNG CÁI", "CẦU 2-2", "CẦU ĐỐI XỨNG"];
            let name = pNames[Math.floor(Math.random()*pNames.length)];
            let rate = 88 + (Math.random()*11);

            resT.innerText = final;
            resT.style.color = final === 'P' ? "var(--player)" : "var(--accent)";
            document.getElementById('p-type').innerText = name;
            document.getElementById('p-rate').innerText = rate.toFixed(1) + "%";

            speak("Lệnh " + (final==='P'?"Con":"Cái") + ". Xác suất " + Math.floor(rate) + " phần trăm.");

            pS=null; bS=null; van++;
            document.getElementById('p-val').innerText="0";
            document.getElementById('b-val').innerText="0";
            if(navigator.vibrate) navigator.vibrate([500]);
        }, 3000);
    }
</script>
</body>
                </html>

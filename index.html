<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --hacker: #00ff41; --p: #00f2ff; --b: #ff4d4d; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Courier New', monospace; }
        body { background: transparent; color: var(--hacker); overflow: hidden; }

        #g9-xray {
            position: fixed; width: 300px; top: 10px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 10, 0, 0.95); border: 2px solid var(--hacker);
            border-radius: 15px; box-shadow: 0 0 30px var(--hacker);
            z-index: 9999; padding: 10px; text-align: center;
        }

        /* VÙNG CAMERA QUÉT */
        #cam-container { position: relative; width: 100%; height: 200px; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #333; }
        #video { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.5) brightness(1.2); }
        
        /* ẢNH QUÂN BÀI ẢO (VIRTUAL CARD) */
        #virtual-card {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 70px; height: 100px; border-radius: 5px;
            display: none; z-index: 10; border: 2px solid gold;
            box-shadow: 0 0 20px gold; animation: pop 0.3s ease-out;
        }
        @keyframes pop { from { transform: translate(-50%, -50%) scale(0); } to { transform: translate(-50%, -50%) scale(1); } }

        .laser-line { position: absolute; width: 100%; height: 2px; background: red; top: 50%; box-shadow: 0 0 15px red; z-index: 5; }
        .btn { width: 100%; padding: 12px; background: var(--hacker); color: #000; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        #info { font-size: 10px; margin-top: 5px; color: #888; }
    </style>
</head>
<body>

<div id="g9-xray">
    <div style="font-size: 10px; margin-bottom: 5px;">G9 REVEAL VISION | ID: 0nbtruonglek6</div>
    
    <div id="cam-container">
        <video id="video" autoplay playsinline></video>
        <div class="laser-line"></div>
        <img id="virtual-card" src="" alt="Card">
    </div>

    <div id="result" style="font-size: 24px; font-weight: 900; margin: 10px 0;">SẴN SÀNG</div>
    <button class="btn" onclick="revealCard()">SOI XUYÊN LÁ BÀI</button>
    <div id="info">Đang chờ Dealer chia bài...</div>
</div>

<script>
    const cardImg = document.getElementById('virtual-card');
    const res = document.getElementById('result');
    const info = document.getElementById('info');

    // Mở Camera
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
        .then(stream => { document.getElementById('video').srcObject = stream; })
        .catch(err => { alert("Lỗi Camera!"); });

    function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'vi-VN'; window.speechSynthesis.speak(m); }

    function revealCard() {
        cardImg.style.display = 'none';
        res.innerText = "DECODING...";
        info.innerText = "Đang quét cấu trúc phân tử mực in...";
        speak("Bắt đầu quét xuyên lá bài.");

        setTimeout(() => {
            // Danh sách ảnh bài mẫu (Em ví dụ vài quân, anh có thể thêm link ảnh thật)
            const cards = [
                { val: "PLAYER: 9 ĐIỂM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/0/05/English_pattern_9_of_hearts.svg/1200px-English_pattern_9_of_hearts.svg.png" },
                { val: "BANKER: 8 ĐIỂM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/2/26/English_pattern_8_of_diamonds.svg/1200px-English_pattern_8_of_diamonds.svg.png" },
                { val: "PLAYER: 7 ĐIỂM", img: "https://upload.wikimedia.org/wikipedia/commons/thumb/d/d4/English_pattern_7_of_spades.svg/800px-English_pattern_7_of_spades.svg.png" }
            ];

            const pick = cards[Math.floor(Math.random() * cards.length)];
            
            // HIỂN THỊ ẢNH MẶT TRƯỚC LÊN MÀN HÌNH
            cardImg.src = pick.img;
            cardImg.style.display = 'block';
            
            res.innerText = pick.val;
            res.style.color = pick.val.includes("BANKER") ? "var(--b)" : "var(--p)";
            info.innerText = "Xác suất chính xác: 98.9%";
            
            speak("Đã nhận diện quân bài. " + pick.val);
        }, 2000);
    }
</script>
</body>
</html>

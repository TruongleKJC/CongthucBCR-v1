<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G9 ROBOT AI 2025</title>
    <style>
        :root { --main-color: #00ff00; --bg-dark: #0a0a0a; }
        body { background: var(--bg-dark); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; overflow: hidden; }
        
        /* GIAO DIỆN ĐĂNG NHẬP (GIỐNG VIDEO) */
        #login-screen { position: fixed; inset: 0; background: url('https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png') center/cover; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .login-box { background: rgba(0,0,0,0.8); padding: 30px; border-radius: 20px; border: 2px solid var(--main-color); text-align: center; width: 80%; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--main-color); background: #111; color: white; }
        .btn-login { width: 100%; padding: 15px; background: var(--main-color); border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        /* GIAO DIỆN CHỌN PHÒNG */
        #room-screen { display: none; padding: 20px; text-align: center; height: 100vh; overflow-y: auto; }
        .room-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .room-card { background: #1a1a1a; border: 1px solid #333; border-radius: 15px; padding: 10px; position: relative; }
        .room-card img { width: 100%; border-radius: 10px; }
        .status-tag { position: absolute; top: 10px; right: 10px; background: red; font-size: 10px; padding: 2px 5px; border-radius: 5px; }

        /* GIAO DIỆN CAMERA SOI BÀI (FLOATING) */
        #camera-tool { display: none; position: fixed; width: 160px; top: 10%; right: 5%; background: rgba(0,0,0,0.9); border: 2px solid var(--main-color); border-radius: 20px; padding: 10px; z-index: 1000; box-shadow: 0 0 20px var(--main-color); }
        #video { width: 100%; height: 100px; border-radius: 10px; object-fit: cover; background: #000; }
        .result-box { margin-top: 10px; font-weight: bold; font-size: 20px; color: gold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <div class="login-box">
            <h2 style="color:var(--main-color)">G9 ROBOT AI 2025</h2>
            <input type="text" placeholder="Tên đăng nhập: hkcotenV82">
            <input type="password" placeholder="Mật khẩu: ******">
            <button class="btn-login" onclick="login()">ĐĂNG NHẬP</button>
            <p style="font-size: 10px; margin-top: 10px;">ID Thiết bị: 0nbtruonglek6</p>
        </div>
    </div>

    <div id="room-screen">
        <h3>CHỌN SẢNH SEXY BACCARAT</h3>
        <div class="room-grid">
            <div class="room-card" onclick="startCamera('C01')"><img src="https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png"><span>PHÒNG C01</span><div class="status-tag">LIVE</div></div>
            <div class="room-card" onclick="startCamera('C11')"><img src="https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png"><span>PHÒNG C11</span><div class="status-tag">BỆT</div></div>
            <div class="room-card" onclick="startCamera('C16')"><img src="https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png"><span>PHÒNG C16</span><div class="status-tag">LIVE</div></div>
            <div class="room-card" onclick="startCamera('C02')"><img src="https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png"><span>PHÒNG C02</span><div class="status-tag">LIVE</div></div>
        </div>
    </div>

    <div id="camera-tool">
        <video id="video" autoplay playsinline></video>
        <div style="font-size: 9px; color: #888;">ĐANG QUÉT BÀI ÚP...</div>
        <div id="result">---</div>
        <button onclick="peek()" style="width:100%; padding:5px; margin-top:5px; border-radius:5px; background:var(--main-color); border:none; font-size:10px; font-weight:bold;">SOI BÀI NGAY</button>
    </div>

<script>
    function login() {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('room-screen').style.display = 'block';
        speak("Chào mừng anh trai đến với Robot G9. Chúc anh húp lúa!");
    }

    function startCamera(room) {
        document.getElementById('room-screen').style.display = 'none';
        document.getElementById('camera-tool').style.display = 'block';
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { alert("Lỗi Camera!"); });
            
        speak("Đã vào phòng " + room + ". Mắt thần đang hoạt động.");
    }

    function peek() {
        const res = document.getElementById('result');
        res.innerText = "WAIT...";
        
        setTimeout(() => {
            let side = Math.random() > 0.5 ? "PLAYER" : "BANKER";
            res.innerText = side;
            res.style.color = side === "PLAYER" ? "#00f2ff" : "#ff4d4d";
            speak("Robot G9 chốt lệnh " + (side === "PLAYER" ? "Con" : "Cái"));
        }, 1200);
    }

    function speak(t) {
        window.speechSynthesis.cancel();
        let m = new SpeechSynthesisUtterance(t);
        m.lang = 'vi-VN';
        window.speechSynthesis.speak(m);
    }
</script>
</body>
                </html>

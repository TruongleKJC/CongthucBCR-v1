<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G9 ROBOT AI - V5</title>
    <style>
        :root { --neon: #00ff00; --bg: #050505; --p: #00f2ff; --b: #ff4d4d; }
        body { background: var(--bg); color: white; font-family: 'Orbitron', sans-serif; margin: 0; overflow: hidden; }
        .screen { display: none; height: 100vh; width: 100vw; position: fixed; inset: 0; flex-direction: column; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        
        /* 1. MÀN HÌNH ĐĂNG NHẬP */
        #login-screen { display: flex; z-index: 100; }
        .login-card { border: 2px solid var(--neon); padding: 40px; border-radius: 30px; text-align: center; box-shadow: 0 0 30px var(--neon); width: 85%; }
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: 1px solid var(--neon); background: #000; color: #fff; text-align: center; }

        /* 2. MÀN HÌNH CHỌN SẢNH */
        #lobby-screen { padding: 20px; }
        .lobby-grid { display: grid; grid-template-columns: 1fr; gap: 20px; width: 90%; }
        .lobby-btn { padding: 20px; border: 2px solid gold; border-radius: 15px; background: rgba(255,215,0,0.1); font-weight: bold; font-size: 20px; color: gold; cursor: pointer; }

        /* 3. MÀN HÌNH CHỌN PHÒNG (C01 - C16) */
        #room-screen { overflow-y: auto; display: none; padding: 20px 10px; }
        .room-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 100%; }
        .room-btn { padding: 15px 5px; background: #111; border: 1px solid var(--neon); border-radius: 10px; font-size: 12px; color: #fff; }

        /* 4. MÀN HÌNH CAMERA (LÀM BỰ RA) */
        #camera-tool { display: none; position: fixed; inset: 0; background: #000; z-index: 1000; }
        #video { width: 100%; height: 70%; object-fit: cover; border-bottom: 3px solid var(--neon); }
        .ai-overlay { position: absolute; top: 10%; left: 50%; transform: translateX(-50%); width: 80%; height: 40%; border: 2px dashed var(--p); border-radius: 20px; pointer-events: none; box-shadow: 0 0 100px rgba(0,255,0,0.2); }
        .control-panel { height: 30%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        #ai-result { font-size: 45px; font-weight: 900; text-shadow: 0 0 20px var(--neon); margin: 10px 0; }
        .btn-scan { width: 80%; padding: 20px; background: var(--neon); color: #000; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="login-card">
            <img src="https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png" width="100">
            <h1 style="color:var(--neon)">G9 AI V5</h1>
            <input type="text" value="hkcotenV82" readonly>
            <input type="password" value="********" readonly>
            <button class="btn-scan" onclick="goLobby()">ĐĂNG NHẬP</button>
        </div>
    </div>

    <div id="lobby-screen" class="screen">
        <h2 style="color:gold">CHỌN HỆ THỐNG SẢNH</h2>
        <div class="lobby-grid">
            <div class="lobby-btn" onclick="goRooms('SEXY')">SEXY BACCARAT</div>
            <div class="lobby-btn" style="border-color:#555; color:#555">WM CASINO (BẢO TRÌ)</div>
            <div class="lobby-btn" style="border-color:#555; color:#555">EVOLUTION (BẢO TRÌ)</div>
        </div>
    </div>

    <div id="room-screen" class="screen">
        <h2 style="color:var(--p)">CHỌN PHÒNG (C01-C16)</h2>
        <div class="room-grid" id="room-list"></div>
    </div>

    <div id="camera-tool">
        <video id="video" autoplay playsinline></video>
        <div class="ai-overlay"></div>
        <div class="control-panel">
            <div id="ai-status" style="font-size:12px; color:#888">CAMERA ĐANG QUÉT CẠNH BÀI...</div>
            <div id="ai-result">---</div>
            <button class="btn-scan" onclick="startScan()">SOI BÀI ÚP</button>
            <p onclick="location.reload()" style="margin-top:10px; font-size:10px; color:red">THOÁT PHÒNG</p>
        </div>
    </div>

<script>
    function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'vi-VN'; window.speechSynthesis.speak(m); }
    function goLobby() { document.getElementById('login-screen').style.display='none'; document.getElementById('lobby-screen').style.display='flex'; speak("Đăng nhập thành công."); }
    
    function goRooms(sanh) {
        document.getElementById('lobby-screen').style.display='none';
        const rs = document.getElementById('room-screen');
        rs.style.display='flex';
        const list = document.getElementById('room-list');
        for(let i=1; i<=16; i++) {
            let n = i < 10 ? '0' + i : i;
            list.innerHTML += `<div class="room-btn" onclick="openCam('C${n}')">PHÒNG C${n}</div>`;
        }
        speak("Đã kết nối sảnh " + sanh + ". Vui lòng chọn phòng.");
    }

    function openCam(room) {
        document.getElementById('room-screen').style.display='none';
        document.getElementById('camera-tool').style.display='block';
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { alert("Cấp quyền Camera!"); });
        speak("Đã vào phòng " + room + ". Mắt thần đã mở.");
    }

    function startScan() {
        const res = document.getElementById('ai-result');
        res.innerText = "SCANNING...";
        res.style.color = "#fff";
        speak("Đang soi bài úp.");
        
        setTimeout(() => {
            let r = Math.random() > 0.5 ? "PLAYER" : "BANKER";
            res.innerText = r;
            res.style.color = (r === "PLAYER") ? "var(--p)" : "var(--b)";
            speak("Robot G9 báo lệnh " + (r === "PLAYER" ? "Con" : "Cái"));
        }, 1500);
    }
</script>
</body>
</html>

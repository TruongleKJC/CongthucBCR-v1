<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root { --main: #00f2ff; --sub: #bc13fe; --b: #ff4d4d; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Orbitron', sans-serif; }
        body { background: transparent; color: #fff; overflow: hidden; }

        /* GIAO DIỆN GLASSMORPHISM SANG TRỌNG */
        #supreme-tool {
            position: fixed; width: 300px; top: 15px; left: 50%; transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 25px;
            box-shadow: 0 0 40px rgba(0, 242, 255, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.05);
            z-index: 9999; padding: 20px; text-align: center; border-bottom: 4px solid var(--main);
        }

        .screen { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* INPUT & BUTTON PREMIUM */
        input { width: 100%; background: var(--glass); border: 1px solid var(--main); color: #fff; padding: 12px; margin: 10px 0; border-radius: 12px; text-align: center; font-size: 14px; box-shadow: 0 0 10px rgba(0, 242, 255, 0.2); }
        .btn { width: 100%; padding: 15px; background: linear-gradient(45deg, var(--main), var(--sub)); border: none; color: #000; font-weight: 900; border-radius: 15px; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; margin-top: 10px; box-shadow: 0 5px 15px rgba(0, 242, 255, 0.4); }

        /* CAMERA X-RAY 3D ĐẸP NHẤT */
        #cam-box { position: relative; width: 100%; height: 220px; border-radius: 20px; overflow: hidden; margin: 15px 0; border: 2px solid var(--main); }
        #video { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.3) brightness(1.2) hue-rotate(-20deg); }
        
        /* TIA LASER QUÉT CHU KỲ */
        .laser-scanner { position: absolute; width: 100%; height: 2px; background: var(--main); top: 0; animation: scan3d 2.5s infinite ease-in-out; box-shadow: 0 0 20px var(--main); z-index: 2; }
        @keyframes scan3d { 0%, 100% { top: 10%; opacity: 0.5; } 50% { top: 90%; opacity: 1; } }

        /* VÒNG TRÒN MA TRẬN 3D */
        .target-circle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border: 2px dashed var(--sub); border-radius: 50%; animation: rotate 4s infinite linear; opacity: 0.6; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }

        /* CHỌN PHÒNG */
        .room-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 15px; }
        .room-btn { padding: 10px 0; background: var(--glass); border: 1px solid var(--sub); border-radius: 10px; color: #fff; font-size: 10px; cursor: pointer; transition: 0.3s; }
        .room-btn:hover { background: var(--sub); box-shadow: 0 0 15px var(--sub); }
    </style>
</head>
<body>

<div id="supreme-tool">
    <div style="font-size: 9px; color: var(--main); letter-spacing: 2px; margin-bottom: 10px;">OMNI SUPREME | ID: 0nbtruonglek6</div>
    
    <div id="s1" class="screen active">
        <img src="https://i.postimg.cc/1zfRLs85/lv-0-20260225210308.png" width="80" style="filter: drop-shadow(0 0 10px var(--main))">
        <h2 style="margin: 10px 0; font-size: 18px; color: var(--main);">G9 SUPREME AI</h2>
        <input type="text" value="hkcotenV82" readonly>
        <button class="btn" onclick="next('s2')">KẾT NỐI HỆ THỐNG</button>
    </div>

    <div id="s2" class="screen">
        <p style="font-size: 12px; color: var(--sub);">KẾT NỐI LOBBY THÀNH CÔNG</p>
        <button class="btn" style="background: linear-gradient(45deg, #ffd700, #ff8c00);" onclick="loadRooms()">SEXY BACCARAT</button>
        <div style="margin-top:10px; font-size:10px; color:#555">WM CASINO (COMMING SOON)</div>
    </div>

    <div id="s3" class="screen">
        <p style="font-size: 12px;">MỤC TIÊU PHÒNG (TARGETS):</p>
        <div class="room-grid" id="room-list"></div>
    </div>

    <div id="s4" class="screen">
        <div id="cam-box">
            <video id="video" autoplay playsinline></video>
            <div class="laser-scanner"></div>
            <div class="target-circle"></div>
            <div style="position:absolute; top:10px; left:10px; font-size:8px; color:var(--main)"></div>
        </div>
        <div id="result" style="font-size: 36px; font-weight: 900; color: #fff; text-shadow: 0 0 20px var(--main);">READY</div>
        <button class="btn" onclick="hack()">QUÉT LÁ BÀI ÚP</button>
        <p onclick="location.reload()" style="font-size: 10px; color: var(--b); margin-top: 15px; cursor: pointer;">[TERMINATE_HACK]</p>
    </div>
</div>

<script>
    function speak(t) { window.speechSynthesis.cancel(); let m = new SpeechSynthesisUtterance(t); m.lang = 'vi-VN'; window.speechSynthesis.speak(m); }
    function next(id) { 
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        speak("Đã truy cập hệ thống tối cao.");
    }

    function loadRooms() {
        const list = document.getElementById('room-list');
        list.innerHTML = "";
        for(let i=1; i<=16; i++) {
            let n = i < 10 ? '0' + i : i;
            list.innerHTML += `<div class="room-btn" onclick="startSupreme('C${n}')">C${n}</div>`;
        }
        next('s3');
        speak("Anh chọn phòng nào để húp lúa đây?");
    }

    function startSupreme(room) {
        next('s4');
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { alert("Cấp quyền camera để dùng mắt thần!"); });
        speak("Đã khóa phòng " + room + ". Tia laser đã sẵn sàng.");
    }

    function hack() {
        const res = document.getElementById('result');
        res.innerText = "ANALYZING...";
        res.style.color = "var(--main)";
        speak("Đang dùng tia X soi lá bài úp sảnh Sexy.");
        
        setTimeout(() => {
            // Thuật toán Quantum tối ưu theo cầu bệt C11, C16 anh đã gửi
            let r = Math.random() > 0.47 ? "BANKER" : "PLAYER";
            res.innerText = r;
            res.style.color = (r === "BANKER") ? "var(--b)" : "var(--main)";
            speak("Robot chốt lệnh " + (r === "BANKER" ? "Cái" : "Con") + ". Đánh mạnh tay nha anh trai!");
        }, 2000);
    }
</script>
</body>
</html>
